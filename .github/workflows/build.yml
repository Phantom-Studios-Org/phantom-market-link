name: Build

# CI: build every Stonecutter version on push / PR and keep the jars as
# downloadable artifacts. Does not publish anything.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 25 runs Gradle (Loom needs it to set up MC 26.x). Per-version compile
      # uses the Java toolchains declared in build.gradle.kts (17 / 21 / 25).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Build all versions
        run: |
          chmod +x gradlew
          ./gradlew chiseledBuild

      # Gather the release jars (skip -sources / -dev) into one folder.
      - name: Collect jars
        run: |
          mkdir -p dist
          find versions -path '*/build/libs/*.jar' \
            ! -name '*-sources.jar' ! -name '*-dev.jar' -exec cp {} dist/ \;
          ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: dist/*.jar
          if-no-files-found: error
